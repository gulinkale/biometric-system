<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Identify | Biometric Module</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>

<body data-page="identify">
  <div class="app-container">

    <div class="card" id="flowDebugPanel" style="border:1px dashed #3a6ea5; background:#122238; padding:10px 12px; margin-bottom:12px;">
      <h3 style="margin:0 0 8px 0; font-size:0.95rem;">Flow Debug</h3>
      <p class="muted" style="margin:2px 0;">Step: <span id="flowDebugStep">-</span></p>
      <p class="muted" style="margin:2px 0;">Status: <span id="flowDebugStatus">-</span></p>
      <p class="muted" style="margin:2px 0;">Reason: <span id="flowDebugReason">-</span></p>
      <p class="muted" style="margin:2px 0;">Score: <span id="flowDebugScore">-</span></p>
    </div>

    <!-- STEP 1: FACE -->
    <div class="card" id="step-face">
      <h2>Face</h2>
      <p>Please look at the camera.</p>

      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" class="hidden"></canvas>

      <button class="btn" id="btnCamStart" type="button">Start Camera</button>
      <button class="btn" id="btnFaceCapture" type="button">Capture Face</button>
      <a
        class="btn"
        id="btnBack"
        href="../portal/login_portal.html"
        style="display:inline-block; text-decoration:none; text-align:center;"
      >Back</a>

      <p id="faceStatus" class="muted" style="margin-top:10px;"></p>
    </div>

    <!-- STEP 2: LIVENESS -->
    <div class="card hidden" id="step-liveness">
      <p id="identifiedUserBanner" style="display:none; background:#1e3a5f; color:#7ecfff; border:1px solid #3a6ea5; border-radius:6px; padding:7px 14px; margin-bottom:12px; font-size:0.9rem; text-align:center;">🔍 Identified as: <strong id="identifiedUserName"></strong></p>
      <h2>Liveness Challenge</h2>
      <p id="identifyChallengePrompt">Challenge question loading...</p>

      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:10px;">
        <button class="btn" id="btnCaptureChallengeAnswer" type="button">Capture Spoken Answer</button>
        <button class="btn" id="btnRefreshIdentifyChallenge" type="button">New Question</button>
      </div>

      <input id="identifyChallengeAnswer" class="auth-input" type="text" placeholder="Challenge answer transcript" autocomplete="off" />

      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:10px;">
        <button class="btn" id="btnCheckTurnRight" type="button">Check RIGHT turn</button>
        <button class="btn" id="btnCheckTurnLeft" type="button">Check LEFT turn</button>
      </div>

      <p id="livenessStatus" class="muted" style="margin-top:10px;"></p>
      <button class="btn" id="btnLivenessContinue" type="button" disabled>Complete Verification</button>
    </div>

    <!-- STEP 3: RESULT -->
    <div class="card hidden" id="step-result">
      <h2>Result</h2>

      <p id="result-decision"></p>

      <div class="score-box">
        <p>Face Score: <span id="face-score">-</span></p>
        <p>Liveness: <span id="voice-score">-</span></p>
        <p>Overall: <span id="fusion-score">-</span></p>
      </div>

      <p id="statusText" class="muted" style="margin-top:10px;"></p>
      <button class="btn" id="btnRestartResult" type="button">Restart</button>
    </div>

  </div>

  <script type="module" src="../assets/js/index.js"></script>
</body>
</html>
